<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-label="Multi-provider unified management">
  <title>Multi-provider unified management</title>

  <!-- Connection lines (subtle, drawn first) -->
  <g stroke="#F06858" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.18">
    <line x1="380" y1="160" x2="380" y2="48"/>
    <line x1="380" y1="160" x2="216" y2="78"/>
    <line x1="380" y1="160" x2="544" y2="78"/>
    <line x1="380" y1="160" x2="216" y2="242"/>
    <line x1="380" y1="160" x2="544" y2="242"/>
    <line x1="380" y1="160" x2="380" y2="272"/>
  </g>

  <!-- Traveling pulse dots from center → each chip -->
  <circle r="4" fill="#F06858">
    <animate attributeName="cx" values="380;380" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="160;48" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#F06858">
    <animate attributeName="cx" values="380;216" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="160;78" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#F06858">
    <animate attributeName="cx" values="380;544" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="160;78" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#F06858">
    <animate attributeName="cx" values="380;216" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="160;242" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#F06858">
    <animate attributeName="cx" values="380;544" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="160;242" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#F06858">
    <animate attributeName="cx" values="380;380" dur="2.4s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="160;272" dur="2.4s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Center Tako with double pulse rings -->
  <circle cx="380" cy="160" r="44" fill="none" stroke="#F06858" stroke-width="2.5" opacity="0.65">
    <animate attributeName="r" values="44;110" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.65;0" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="160" r="44" fill="none" stroke="#F06858" stroke-width="2.5" opacity="0.65">
    <animate attributeName="r" values="44;110" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.65;0" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="160" r="44" fill="#F06858"/>
  <text x="380" y="171" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif" font-size="28" font-weight="700" fill="white">T</text>

  <!-- Provider chips -->
  <!-- Top center: Tako Proxy -->
  <g>
    <rect x="310" y="30" width="140" height="36" rx="18" fill="white" stroke="#F06858" stroke-width="1.5"/>
    <circle cx="332" cy="48" r="5" fill="#F06858"/>
    <text x="346" y="53" font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif" font-size="12" font-weight="600" fill="#2D3436">Tako Proxy</text>
  </g>
  <!-- Top left: Anthropic -->
  <g>
    <rect x="146" y="60" width="140" height="36" rx="18" fill="white" stroke="#D97757" stroke-width="1.5"/>
    <circle cx="168" cy="78" r="5" fill="#D97757"/>
    <text x="182" y="83" font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif" font-size="12" font-weight="600" fill="#2D3436">Anthropic</text>
  </g>
  <!-- Top right: Codex Plus -->
  <g>
    <rect x="474" y="60" width="140" height="36" rx="18" fill="white" stroke="#10A37F" stroke-width="1.5"/>
    <circle cx="496" cy="78" r="5" fill="#10A37F"/>
    <text x="510" y="83" font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif" font-size="12" font-weight="600" fill="#2D3436">Codex Plus</text>
  </g>
  <!-- Bottom left: Claude Max -->
  <g>
    <rect x="146" y="224" width="140" height="36" rx="18" fill="white" stroke="#C8765B" stroke-width="1.5"/>
    <circle cx="168" cy="242" r="5" fill="#C8765B"/>
    <text x="182" y="247" font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif" font-size="12" font-weight="600" fill="#2D3436">Claude Max</text>
  </g>
  <!-- Bottom right: DeepSeek -->
  <g>
    <rect x="474" y="224" width="140" height="36" rx="18" fill="white" stroke="#4D6BFE" stroke-width="1.5"/>
    <circle cx="496" cy="242" r="5" fill="#4D6BFE"/>
    <text x="510" y="247" font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif" font-size="12" font-weight="600" fill="#2D3436">DeepSeek</text>
  </g>
  <!-- Bottom center: Custom -->
  <g>
    <rect x="310" y="254" width="140" height="36" rx="18" fill="white" stroke="#64748B" stroke-width="1.5"/>
    <circle cx="332" cy="272" r="5" fill="#64748B"/>
    <text x="346" y="277" font-family="-apple-system,BlinkMacSystemFont,system-ui,sans-serif" font-size="12" font-weight="600" fill="#2D3436">Custom Endpoint</text>
  </g>
</svg>
